name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: >
          dotnet publish LogAnalyzer.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish

      - name: Rename binary with version
        shell: pwsh
        run: Rename-Item -Path publish/LogAnalyzer.exe -NewName "LogAnalyzer-${{ github.ref_name }}.exe"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: PBX Log Analyzer ${{ github.ref_name }}
          files: publish/LogAnalyzer-${{ github.ref_name }}.exe
          generate_release_notes: true
